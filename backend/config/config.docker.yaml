server:
  addr: ":8080"
  mode: "release"

log:
  level: "info"
  dir: "logs"

database:
  dsn: "host=postgres port=5432 user=cgoforum password=cgoforum123 dbname=cgoforum sslmode=disable TimeZone=Asia/Shanghai"
  max_idle: 10
  max_open: 100
  conn_max_lifetime: 3600

redis:
  addr: "redis:6379"
  password: ""
  db: 0

rabbitmq:
  url: "amqp://cgoforum:cgoforum123@rabbitmq:5672/"

meilisearch:
  addr: "http://meilisearch:7700"
  api_key: "cgoforum_master_key"
  index: "articles"

vectorizer:
  endpoint: "http://vectorizer:8001"
  model: "moka-ai/m3e-base"
  timeout_ms: 12000

jwt:
  private_key_path: "config/keys/private.pem"
  public_key_path: "config/keys/public.pem"
  access_expire: 1800
  refresh_expire: 604800
  issuer: "cgoforum"
